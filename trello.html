<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interface de login do Trello</title>
    <link rel="stylesheet" href="css/style.css" />

    <!--
      <script src="https://unpkg.com/@codans/trello"></script>
    -->
  </head>
  <body>
    <section id="caixa">
      <img src="img/trello.svg" alt="logo do Trello" width="200px" id="logo" />
      <h1>Fazer login no Trello</h1>
      <form action="" method="get">
        <input
          type="text"
          name="email"
          placeholder="Digite seu e-mail"
          required
        />
        <br />
        <input
          type="password"
          name="senha"
          placeholder="Digite sua senha"
          required
        />
        <br />
        <input type="button" value="Fazer login" />
        <span>Ou</span><br />
        <br />
        <br />
        <button class="botao">
          <img
            src="img/google.svg"
            width="20px"
            height="20px"
            alt="Entrar com Google"
          />
          Continuar com Google
        </button>
        <button class="botao">
          <img
            src="img/microsoft.svg"
            width="20px"
            height="20px"
            alt="Entrar com Microsoft"
          />
          Continuar com Microsoft
        </button>
        <button class="botao">
          <img
            src="img/apple.svg"
            width="20px"
            height="20px"
            alt="Entrar com Apple"
          />
          Continuar com Apple
        </button>
        <button class="botao">
          <img
            src="img/slack.svg"
            width="20px"
            height="20px"
            alt="Entrar com Slack"
          />
          Continuar com Slack
        </button>
      </form>
      <img
        src="img/atlassian.svg"
        alt="logo da Atlassian"
        width="200px"
        id="atlassian"
      />
    </section>
    <img
      src="img/analytics.svg"
      alt="logo da Atlassian"
      width="200px"
      id="analytics-logo"
    />
    <img
      src="img/interactive.svg"
      alt="logo da Atlassian"
      width="200px"
      id="interactive-logo"
    />
  </body>
</html>
