<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Elemento Imagem</title>
  </head>
  <body>
    <h1>O elemento Imagem</h1>
    <h2>Como inserir imagens em uma página HTML</h2>
    <img src="imagens/js.jpg" alt="imagem de JavaScript" / >

    <h2>Imagens da Formula 1</h2>
    <img src="imagens/logo.png" alt="logo da Formula 1" / > 
    <figure><img src="imagens/p1.jpeg" alt="imagem do piloto Max Verstappen" / width="500" height="350" title="Max Verstappen - piloto da Red Bull Racing" />
    <figcaption>Max Verstappen - piloto da Red Bull Racing</figcaption>
    </figure>
    <figure><img src="imagens/p3.jpeg" alt="imagem do piloto Lewis Hamilton" / width="500" height="350" title="Lewis Hamilton - piloto da Mercedes" />
    <figcaption>Lewis Hamilton - piloto da Mercedes</figcaption>
    </figure>
    <figure>
      <img src="imagens/p2.jpeg" alt="imagem do piloto Charles Leclerc" / 
      width="500" height="350"
      title="Charles Leclerc - piloto da Ferrari" />
      
      <figcaption>Charles Leclerc - piloto da Ferrari</figcaption>
    </figure>
  </body>
  <footer>CR STUDIO WEB. Todos os direitos reservados - 2026</footer>
</html>
